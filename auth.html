<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - InstaAutomate</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="baseUrl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Vibrant Animated Background Blobs -->
  <div class="bg-glow">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card" id="authCard">
      <div class="auth-header">
        <div class="logo-badge">⚡</div>
        <h1 class="auth-title">InstaAutomate</h1>
        <p class="auth-subtitle">AI-Powered Instagram Automation</p>
      </div>

      <!-- Tab Switcher -->
      <div class="auth-tabs">
        <button id="loginTab" class="tab active" data-tab="login">Sign In</button>
        <button id="signupTab" class="tab" data-tab="signup">Create Account</button>
      </div>

      <!-- Rich Alert Display Box -->
      <div id="authAlert" class="auth-alert hidden">
        <span class="alert-icon">✕</span>
        <span id="authAlertMsg" class="alert-message">Error message here</span>
      </div>

      <!-- Sign In Form -->
      <form id="loginForm" class="auth-form">
        <div class="input-group">
          <label for="loginEmail">Email Address</label>
          <div class="input-wrapper">
            <span class="field-icon">✉️</span>
            <input type="email" id="loginEmail" placeholder="name@example.com" required>
          </div>
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper">
            <span class="field-icon">🔒</span>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
            <button type="button" class="password-toggle" tabindex="-1">👁️</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-glow">
          <span>Sign In</span>
          <span class="btn-arrow">→</span>
        </button>
        <div class="auth-footer">
          <a href="#" id="resetPassword">Forgot your password?</a>
          <span style="display:block;margin-top:12px;font-size:13px;color:var(--text-secondary)">
            <a href="admin-login.html" style="color:var(--accent)">Admin portal</a>
          </span>
        </div>
      </form>

      <!-- Sign Up Form -->
      <form id="signupForm" class="auth-form hidden">
        <div class="input-group">
          <label for="signupFullName">Full Name</label>
          <div class="input-wrapper">
            <span class="field-icon">👤</span>
            <input type="text" id="signupFullName" placeholder="John Doe" required>
          </div>
        </div>
        <div class="input-group">
          <label for="signupEmail">Email Address</label>
          <div class="input-wrapper">
            <span class="field-icon">✉️</span>
            <input type="email" id="signupEmail" placeholder="name@example.com" required>
          </div>
        </div>
        <div class="input-group">
          <label for="signupPassword">Password</label>
          <div class="input-wrapper">
            <span class="field-icon">🔒</span>
            <input type="password" id="signupPassword" placeholder="Minimum 6 characters" minlength="6" required>
            <button type="button" class="password-toggle" tabindex="-1">👁️</button>
          </div>
          <!-- Dynamic Password Criteria Checklist -->
          <div class="password-criteria-checklist">
            <div id="criteriaLength" class="criteria-item">
              <span class="status-icon">❌</span>
              <span>At least 6 characters</span>
            </div>
            <div id="criteriaNumber" class="criteria-item">
              <span class="status-icon">❌</span>
              <span>Contains a number or special char</span>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-glow">
          <span>Create Account</span>
          <span class="btn-arrow">→</span>
        </button>
      </form>

      <div class="auth-divider">
        <span>or connect using</span>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px; width: 100%;">
        <div style="display: flex; gap: 12px; width: 100%;">
          <button type="button" id="googleBtn" class="btn btn-secondary btn-full btn-google" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Google</span>
          </button>

          <button type="button" id="directLoginBtn" class="btn btn-secondary btn-full" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); color: var(--text-secondary); transition: all 0.2s;">
            <span>⚡ Demo Login</span>
          </button>
        </div>

        <!-- Loki one-click setup removed -->
      </div>
    </div>
  </div>

  <script>
    // Lightweight fallback tab switcher and cleanup: runs even if other scripts fail
    (function(){
      function switchAuthTabLight(tab) {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        if (!loginForm || !signupForm) return;
        if (tab === 'signup') {
          signupForm.classList.remove('hidden');
          loginForm.classList.add('hidden');
          signupTab?.classList.add('active');
          loginTab?.classList.remove('active');
        } else {
          loginForm.classList.remove('hidden');
          signupForm.classList.add('hidden');
          loginTab?.classList.add('active');
          signupTab?.classList.remove('active');
        }
      }

      // Expose light switch so tests can use it
      window.switchAuthTabLight = switchAuthTabLight;

      // Attach to tab buttons asap
      document.addEventListener('click', (e) => {
        const t = e.target;
        if (t && t.id === 'signupTab') { e.preventDefault(); switchAuthTabLight('signup'); }
        if (t && t.id === 'loginTab') { e.preventDefault(); switchAuthTabLight('login'); }
      }, true);

      // Remove stray Loki one-click button if present
      try {
        document.querySelectorAll('button').forEach(b => {
          if (b.innerText && b.innerText.includes("One-Click Auto-Setup")) b.remove();
        });
      } catch (e) {}
    })();
  </script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/instagram.js"></script>
  <script src="js/auth.js"></script>

  <style>
    :root {
      --bg-primary: #030712;
      --bg-secondary: rgba(17, 24, 39, 0.45);
      --border-glass: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(9, 15, 30, 0.65);
      --accent: #7C3AED;
      --accent-hover: #6D28D9;
      --accent-glow: rgba(124, 58, 237, 0.35);
      --text-primary: #FFFFFF;
      --text-secondary: #9CA3AF;
      --error: #EF4444;
      --success: #10B981;
    }

    body {
      background: var(--bg-primary);
      overflow-x: hidden;
      position: relative;
    }

    /* Ambient Animated Glow Blobs */
    .bg-glow {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      mix-blend-mode: screen;
      animation: float 20s infinite alternate ease-in-out;
    }

    .blob-1 {
      top: -10%;
      left: -10%;
      width: 50vw;
      height: 50vw;
      background: #7C3AED;
      animation-duration: 25s;
    }

    .blob-2 {
      bottom: -10%;
      right: -10%;
      width: 45vw;
      height: 45vw;
      background: #EC4899;
      animation-duration: 18s;
      animation-delay: -5s;
    }

    .blob-3 {
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 35vw;
      height: 35vw;
      background: #3B82F6;
      opacity: 0.1;
      animation-duration: 30s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      50% { transform: translate(60px, 40px) scale(1.15) rotate(180deg); }
      100% { transform: translate(-40px, -60px) scale(0.85) rotate(360deg); }
    }

    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    
    .auth-card {
      background: var(--bg-secondary);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 44px;
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border-glass);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .auth-card:hover {
      border-color: rgba(124, 58, 237, 0.25);
      box-shadow: 0 30px 70px rgba(124, 58, 237, 0.12);
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #7C3AED, #EC4899);
      border-radius: 15px;
      font-size: 26px;
      margin-bottom: 18px;
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.35);
    }
    
    .auth-title {
      font-family: 'Clash Display', sans-serif;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #FFFFFF, #94A3B8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    
    .auth-subtitle {
      color: var(--text-secondary);
      font-size: 14.5px;
      font-weight: 500;
    }
    
    .auth-tabs {
      display: flex;
      gap: 6px;
      background: rgba(9, 15, 30, 0.55);
      padding: 5px;
      border-radius: 12px;
      margin-bottom: 24px;
      border: 1px solid var(--border-glass);
    }
    
    .auth-tabs .tab {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14.5px;
      color: var(--text-secondary);
      background: transparent;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .auth-tabs .tab.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    /* Beautiful Premium Alert Banner */
    .auth-alert {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    .auth-alert.success {
      background: rgba(16, 185, 129, 0.08);
      border-color: rgba(16, 185, 129, 0.25);
    }

    .alert-icon {
      font-weight: 700;
      font-size: 13px;
      background: var(--error);
      color: white;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .auth-alert.success .alert-icon {
      background: var(--success);
    }

    .alert-message {
      font-size: 13px;
      line-height: 1.5;
      font-weight: 500;
      color: #FCA5A5;
    }

    .auth-alert.success .alert-message {
      color: #A7F3D0;
    }

    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    
    .auth-form {
      margin-bottom: 24px;
      animation: fadeIn 0.3s ease;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .field-icon {
      position: absolute;
      left: 14px;
      font-size: 16px;
      pointer-events: none;
      opacity: 0.6;
    }

    .input-group input {
      padding-left: 44px !important;
      background: var(--input-bg) !important;
      border-color: var(--border-glass) !important;
      transition: all 0.2s;
      color: #ffffff !important;
    }

    .input-group input:focus {
      border-color: var(--accent) !important;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
      background: rgba(9, 15, 30, 0.85) !important;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s;
    }

    .password-toggle:hover {
      color: var(--text-primary);
    }

    /* Password Checklist */
    .password-criteria-checklist {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 10px 14px;
      background: rgba(9, 15, 30, 0.45);
      border: 1px solid var(--border-glass);
      border-radius: 8px;
    }

    .criteria-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
    }

    .criteria-item.met {
      color: #A7F3D0;
    }

    .status-icon {
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .btn-full {
      width: 100%;
      height: 48px;
      font-size: 15px;
      border-radius: 10px;
    }

    .btn-glow:hover {
      box-shadow: 0 8px 24px rgba(124, 58, 237, 0.4);
    }

    .btn-arrow {
      margin-left: 6px;
      transition: transform 0.2s;
    }

    .btn-primary:hover .btn-arrow {
      transform: translateX(4px);
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 18px;
    }
    
    .auth-footer a {
      color: var(--text-secondary);
      font-size: 13.5px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .auth-footer a:hover {
      color: var(--accent);
    }
    
    .auth-divider {
      text-align: center;
      margin: 28px 0 20px;
      position: relative;
    }
    
    .auth-divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-glass);
    }
    
    .auth-divider span {
      background: #090f1e;
      padding: 0 16px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      position: relative;
    }
    
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 48px;
      background: var(--input-bg);
      border-color: var(--border-glass);
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.2s;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    /* Breathtaking Success Panel styling */
    .success-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .success-icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.2));
      border: 1px solid rgba(16, 185, 129, 0.4);
      border-radius: 50%;
      margin-bottom: 8px;
      box-shadow: 0 10px 25px rgba(16, 185, 129, 0.25);
    }

    .success-checkmark {
      font-size: 32px;
      color: #10B981;
      font-weight: bold;
    }
  </style>
</body>
</html>
