<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstaAutomate • Dashboard</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="baseUrl.js"></script>
  <script src="js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/instagram.js"></script>
  <script defer src="js/dashboard.js"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="nav-brand">
        <span class="logo">🚀</span>
        <span class="brand-name">InstaAutomate</span>
      </div>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-secondary">Dashboard</a>
        <a href="inbox.html" class="btn btn-secondary">Inbox</a>
        <a href="flows.html" class="btn btn-secondary">Flows</a>
        <a href="connect.html" class="btn btn-secondary">Connect</a>
        <a href="campaigns.html" class="btn btn-secondary">Campaigns</a>
        <a href="analytics.html" class="btn btn-secondary">Analytics</a>
        <a href="settings.html" class="btn btn-secondary">Settings</a>
        <button type="button" class="btn btn-secondary" onclick="auth.signOut()">Sign out</button>
      </div>
    </div>
  </nav>

  <section class="container" style="padding: 40px 0;">
    <h2 class="section-title">Connection Overview</h2>
    <div id="connection-status" class="card" style="margin-bottom: 24px;">
      <p>Loading connection info…</p>
    </div>

    <h2 class="section-title">Key Metrics</h2>
    <div class="grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 24px;">
      <div class="card" id="metric-followers"><h3>Followers</h3><p>—</p></div>
      <div class="card" id="metric-dms"><h3>DMs Sent (30d)</h3><p>—</p></div>
      <div class="card" id="metric-comments"><h3>Comments Replied</h3><p>—</p></div>
      <div class="card" id="metric-ai"><h3>AI Replies</h3><p>—</p></div>
    </div>

    <h2 class="section-title" style="margin-top: 40px;">Engagement Over Time</h2>
    <canvas id="engagementChart" width="400" height="200"></canvas>
  </section>
</body>
</html>
