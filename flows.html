    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Automation Flows</h1>
        <button class="btn btn-primary" onclick="openFlowModal()">Create Flow</button>
      </div>

      <div class="table-container">
        <table class="table" id="flowsTable">
          <thead>
            <tr>
              <th>Flow Name</th>
              <th>Trigger Type</th>
              <th>Keywords</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="5">
                <div class="loading" style="margin: 24px auto;"></div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div id="flowModal" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Create Flow</h3>
            <button class="modal-close" id="closeFlowModal">&times;</button>
          </div>
          <form id="flowForm">
            <div class="input-group">
              <label for="flowName">Flow Name</label>
              <input type="text" id="flowName" placeholder="e.g., Welcome Message" required>
            </div>
            <div class="input-group">
              <label for="triggerType">Trigger Type</label>
              <select id="triggerType" required>
                <option value="dm_keyword">DM Keyword</option>
                <option value="comment_keyword">Comment Keyword</option>
                <option value="story_mention">Story Mention</option>
                <option value="first_dm">First DM</option>
              </select>
            </div>
            <div class="input-group">
              <label for="keywords">Keywords (press Enter to add)</label>
              <input type="text" id="keywords" placeholder="e.g., hello, hi, hey">
              <div id="keywordsChips" class="chips-container" style="margin-top: 8px;"></div>
            </div>
            <div class="input-group">
              <label for="triggerCondition">Match Condition</label>
              <select id="triggerCondition">
                <option value="contains">Contains</option>
                <option value="exact">Exact Match</option>
                <option value="starts_with">Starts With</option>
              </select>
            </div>
            <div class="input-group">
              <label for="responseType">Response Type</label>
              <select id="responseType" required>
                <option value="text">Text Message</option>
                <option value="template">Template</option>
                <option value="ai">AI Reply</option>
              </select>
            </div>
            <div class="input-group">
              <label for="responseMessage">Response Message</label>
              <textarea id="responseMessage" rows="4" placeholder="Enter your response message"></textarea>
            </div>
            <div class="input-group">
              <label for="aiSystemPrompt">AI System Prompt (if AI reply)</label>
              <textarea id="aiSystemPrompt" rows="3" placeholder="You are a helpful assistant..."></textarea>
            </div>
            <div class="input-group">
              <label>
                <input type="checkbox" id="caseSensitive"> Case Sensitive
              </label>
            </div>
            <div class="input-group">
              <label>
                <input type="checkbox" id="replyOnce" checked> Reply Once Per User
              </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Flow</button>
          </form>
        </div>
      </div>
    </main>
