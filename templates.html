    <main class="main-content">
      <div class="page-header">
        <h1 class="page-title">Message Templates</h1>
        <button class="btn btn-primary" onclick="openTemplateModal()">Create Template</button>
      </div>

      <div class="templates-grid" id="templatesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
        <div class="loading" style="grid-column: 1/-1; margin: 24px auto;"></div>
      </div>

      <div id="templateModal" class="modal-overlay hidden">
        <div class="modal">
          <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">Create Template</h3>
            <button class="modal-close" id="closeTemplateModal">&times;</button>
          </div>
          <form id="templateForm">
            <div class="input-group">
              <label for="templateName">Template Name</label>
              <input type="text" id="templateName" placeholder="e.g., Welcome Message" required>
            </div>
            <div class="input-group">
              <label for="templateContent">Message Content</label>
              <textarea id="templateContent" rows="6" placeholder="Hi {{username}}! Thanks for reaching out..." required></textarea>
              <small style="color: var(--text-secondary); margin-top: 4px; display: block;">Variables: {{username}}, {{name}}</small>
            </div>
            <div class="input-group">
              <label for="templateVariables">Variables (comma-separated)</label>
              <input type="text" id="templateVariables" placeholder="username, name">
            </div>
            <div class="input-group">
              <label for="templateMedia">Media URL (optional)</label>
              <input type="url" id="templateMedia" placeholder="https://...">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Template</button>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="baseUrl.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/instagram.js"></script>
  <script>
    const templates = {
      async getTemplates() {
        try {
          const user = await getCurrentUser();
          const { data, error } = await supabase
            .from('templates')
            .select('*')
            .eq('user_id', user.id)
            .order('created_at', { ascending: false });

          if (error) throw error;
          return { success: true, data };
        } catch (error) {
          console.error('Error fetching templates:', error);
          return { success: false, error: error.message };
        }
      },

      async createTemplate(templateData) {
        try {
          const user = await getCurrentUser();
          const { data, error } = await supabase
            .from('templates')
            .insert({
              ...templateData,
              user_id: user.id
            })
            .select()
            .single();

          if (error) throw error;

          showToast('Template created successfully!');
          return { success: true, data };
        } catch (error) {
          showToast(error.message, 'error');
          return { success: false, error: error.message };
        }
      },

      async deleteTemplate(templateId) {
        try {
          const { error } = await supabase
            .from('templates')
            .delete()
            .eq('id', templateId);

          if (error) throw error;

          showToast('Template deleted successfully!');
          return { success: true };
        } catch (error) {
          showToast(error.message, 'error');
          return { success: false, error: error.message };
        }
      }
    };

    document.addEventListener('DOMContentLoaded', async () => {
      await requireAuth();
      loadTemplates();
      initTemplateModal();
    });

    async function loadTemplates() {
      const { success, data } = await templates.getTemplates();
      const container = document.getElementById('templatesGrid');
      
      if (container) {
        if (success && data.length > 0) {
          container.innerHTML = data.map(template => `
            <div class="card">
              <h3 style="margin-bottom: 12px;">${template.name}</h3>
              <p style="color: var(--text-secondary); margin-bottom: 16px; white-space: pre-wrap;">${template.content}</p>
              ${template.variables?.length ? `
                <div class="chips-container" style="margin-bottom: 16px;">
                  ${template.variables.map(v => `<span class="chip">{{${v}}}</span>`).join('')}
                </div>
              ` : ''}
              <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" onclick="copyTemplate('${template.content}')">Copy</button>
                <button class="btn btn-danger" onclick="deleteTemplate('${template.id}')">Delete</button>
              </div>
            </div>
          `).join('');
        } else {
          container.innerHTML = `
            <div class="empty-state" style="grid-column: 1/-1;">
              <div class="empty-state-icon">📋</div>
              <div class="empty-state-title">No templates yet</div>
              <div class="empty-state-description">Create reusable message templates for quick responses</div>
              <button class="btn btn-primary" onclick="openTemplateModal()">Create Template</button>
            </div>
          `;
        }
      }
    }

    function initTemplateModal() {
      const modal = document.getElementById('templateModal');
      const form = document.getElementById('templateForm');
      const closeBtn = document.getElementById('closeTemplateModal');

      closeBtn?.addEventListener('click', () => {
        modal.classList.add('hidden');
      });

      form?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const templateData = {
          name: document.getElementById('templateName').value,
          content: document.getElementById('templateContent').value,
          variables: document.getElementById('templateVariables').value.split(',').map(v => v.trim()).filter(v => v),
          media_url: document.getElementById('templateMedia').value
        };

        const btn = e.target.querySelector('button[type="submit"]');
        showLoading(btn);
        await templates.createTemplate(templateData);
        hideLoading(btn, 'Create Template');
        modal.classList.add('hidden');
        loadTemplates();
      });
    }

    window.openTemplateModal = () => {
      const modal = document.getElementById('templateModal');
      const form = document.getElementById('templateForm');
      form.reset();
      modal.classList.remove('hidden');
    };

    window.deleteTemplate = async (templateId) => {
      if (confirm('Are you sure you want to delete this template?')) {
        await templates.deleteTemplate(templateId);
        loadTemplates();
      }
    };

    window.copyTemplate = (content) => {
      navigator.clipboard.writeText(content);
      showToast('Template copied to clipboard!');
    };
  </script>
</body>
